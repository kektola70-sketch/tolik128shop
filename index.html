<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tolik128shop - Гемы и Робуксы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">tolik128shop</div>
        <div class="cart-info">
            Корзина: <span id="cart-count">0</span> шт. | <span id="cart-total">0</span> ₽
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Лучшие цены на игровую валюту!</h1>
            <p>Brawl Stars и Roblox - быстрая доставка на твой аккаунт.</p>
        </section>

        <section class="products">
            <!-- Товар 1: Гемы -->
            <div class="product-card">
                <img src="images/gems.png" alt="Гемы Brawl Stars">
                <h3>170 Гемов</h3>
                <p class="game-name">Brawl Stars</p>
                <p class="price">890 ₽</p>
                <button onclick="addToCart('170 Гемов (Brawl Stars)', 890)">В корзину</button>
            </div>

            <!-- Товар 2: Гемы -->
            <div class="product-card">
                <img src="images/gems.png" alt="Гемы Brawl Stars">
                <h3>360 Гемов</h3>
                <p class="game-name">Brawl Stars</p>
                <p class="price">1790 ₽</p>
                <button onclick="addToCart('360 Гемов (Brawl Stars)', 1790)">В корзину</button>
            </div>

            <!-- Товар 3: Робуксы -->
            <div class="product-card">
                <img src="images/robux.png" alt="Робуксы Roblox">
                <h3>400 Робуксов</h3>
                <p class="game-name">Roblox</p>
                <p class="price">450 ₽</p>
                <button onclick="addToCart('400 Робуксов (Roblox)', 450)">В корзину</button>
            </div>

            <!-- Товар 4: Робуксы -->
            <div class="product-card">
                <img src="images/robux.png" alt="Робуксы Roblox">
                <h3>800 Робуксов</h3>
                <p class="game-name">Roblox</p>
                <p class="price">850 ₽</p>
                <button onclick="addToCart('800 Робуксов (Roblox)', 850)">В корзину</button>
            </div>
        </section>

        <section class="checkout-section">
            <button id="checkout-btn" onclick="checkout()">Оформить заказ через Telegram</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 tolik128shop. Все права защищены.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
